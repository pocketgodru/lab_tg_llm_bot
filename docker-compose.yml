services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mistral-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Дублируем переменные для явности (опционально)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-small-latest}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # Опционально: логи в файл и stdout
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Опционально: healthcheck для мониторинга
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; exit(0 if os.getenv(\"TELEGRAM_BOT_TOKEN\") else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Опционально: ограничение ресурсов
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M